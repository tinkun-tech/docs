name: Deploy Docs

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - app-released
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout tinkun-docs
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Checkout utils_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/utils-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/utils_app

      - name: Checkout email_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/email-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/email_app

      - name: Checkout auth_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/authentication-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/auth_app

      - name: Checkout code_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/code-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/code_app

      - name: Checkout instant_win_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/instant-win-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/instant_win_app

      - name: Checkout marketplace_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/marketplace-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/marketplace_app

      - name: Checkout oidc_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/oidc-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/oidc_app

      - name: Checkout translation_app
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          repository: tinkun-tech/translation-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/translation_app

      - name: Sync docs from app repos
        run: |
          sync_app() {
            local app=$1
            local dest="docs/${app}"
            local src="tmp/${app}"

            # Copy all docs including index.md (owned by the app repo)
            if [ -d "${src}/docs" ]; then
              find "${src}/docs" -maxdepth 1 -name "*.md" | while read f; do
                cp "$f" "${dest}/"
              done
            fi

            # Copy CHANGELOG.md if present in app root
            if [ -f "${src}/CHANGELOG.md" ]; then
              cp "${src}/CHANGELOG.md" "${dest}/changelog.md"
            fi
          }

          sync_app utils_app
          sync_app email_app
          sync_app auth_app
          sync_app code_app
          sync_app instant_win_app
          sync_app marketplace_app
          sync_app oidc_app
          sync_app translation_app

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Zensical
        run: pip install -r requirements.txt

      - name: Build site
        run: zensical build --clean

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
