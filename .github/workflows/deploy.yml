name: Deploy Docs

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - app-released
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and Deploy MkDocs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout tinkun-docs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout utils_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/utils-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/utils_app

      - name: Checkout email_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/email-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/email_app

      - name: Checkout auth_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/authentication-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/auth_app

      - name: Checkout code_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/code-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/code_app

      - name: Checkout instant_win_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/instant-win-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/instant_win_app

      - name: Checkout marketplace_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/marketplace-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/marketplace_app

      - name: Checkout oidc_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/oidc-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/oidc_app

      - name: Checkout translation_app
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: tinkun-tech/translation-app
          token: ${{ secrets.GH_PAT }}
          path: tmp/translation_app

      - name: Sync docs from app repos
        run: |
          sync_app() {
            local app=$1
            local dest="docs/${app}"
            local src="tmp/${app}"

            # Copy feature docs (skip index.md — curated in this repo)
            if [ -d "${src}/docs" ]; then
              find "${src}/docs" -maxdepth 1 -name "*.md" | while read f; do
                fname=$(basename "$f")
                if [ "$fname" != "index.md" ]; then
                  cp "$f" "${dest}/"
                fi
              done
            fi

            # Copy CHANGELOG.md if present in app root
            if [ -f "${src}/CHANGELOG.md" ]; then
              cp "${src}/CHANGELOG.md" "${dest}/changelog.md"
            fi
          }

          sync_app utils_app
          sync_app email_app
          sync_app auth_app
          sync_app code_app
          sync_app instant_win_app
          sync_app marketplace_app
          sync_app oidc_app
          sync_app translation_app

      - name: Lint and fix markdown
        run: npx markdownlint-cli2 --fix "docs/**/*.md"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
